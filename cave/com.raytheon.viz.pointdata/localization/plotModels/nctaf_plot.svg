<?xml-stylesheet type='text/css' href='newplots.css'?>
<svg height="150" width="150" viewBox="0 0 150 150" overflow="visible" plugin="nctaf" style="stroke: rgb(255,255,255);" preserveAspectRatio="xMidYMid meet" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns="http://www.w3.org/2000/svg">

    <defs>
        <script type="text/python" plotDelegate="plotDelegate">
            <![CDATA[
                import re
                
                class ObsPlotDelegate(PlotDelegate):
                    def __init__(self):
                        PlotDelegate.__init__(self)
                    def getSampleText(self, rec):
                        sampleString = rec.getString("TAFTEXT")
                        #strip all multiple spaces and replace newlines with spaces
                        sampleString = re.sub("(\\s)+", " ", sampleString)
                        #replace all FM, TEMPO, PROB, BECMG, RMK with newline
                        sampleString = re.sub("(FM)+", "\n FM", sampleString)
                        sampleString = re.sub("(BECMG)+", "\n BECMG", sampleString)
                        sampleString = re.sub("(TEMPO)+", "\n TEMPO", sampleString)
                        sampleString = re.sub("(PROB)+", "\n PROB", sampleString)
                        sampleString = re.sub("(RMK)+", "\n RMK", sampleString)
                        return sampleString
                plotDelegate = ObsPlotDelegate()
            ]]>
        </script>
        <style type="text/css" xml:space="preserve">
            <![CDATA[
                @font-face { font-family: "WindSymbolFont";
                        src: url(WindSymbols.svg#WindSymbols); }
                @font-face { font-family: "WxSymbolFont";
                        src: url(WxSymbols.svg#WxSymbols); }
                @font-face { font-family: "SpecialSymbolFont";
                        src: url(SpecialSymbols.svg#SpecialSymbols); }
                @font-face { font-family: "MarkerSymbolFont";
                            src: url(MarkerSymbols.svg#MarkerSymbols); }
            ]]>
        </style>

        <symbol overflow="visible" preserveAspectRatio="xMidYMid meet" id="plotData" class="info">
<!-- Sampling -->
            <text x="0" font-size="0.8em" y="0" font-family="Courier" baseline-shift="-0.4em" plotParam="TAFTEXT" class="text" id="TAFTEXT" font-weight="bold" plotMode="SAMPLE"> </text>

<!-- Station ID -->
            <text stroke="rgb(255,204,255)" visibility="visible" id="stationIdText" style="text-anchor: start;" plotParam="stationId" fill="rgb(255,204,255)" baseline-shift="-0.4em" font-weight="bold" font-family="Courier" class="text" plotMode="VISIBLE" x="5" y="-10" font-size="0.8em">0</text>

<!-- CLOUD -->
            <text stroke="rgb(255,255,255)" visibility="visible" id="skyCoverText" style="text-anchor: start;" transform="scale(1.2)" plotParam="SCVR_TYPE" fill="rgb(255,255,255)" baseline-shift="-0.4em" font-weight="bold" font-family="Courier" class="special" plotMode="VISIBLE" x="0" y="-3" font-size="0.8em">64</text>

<!-- Visibility -->
            <text stroke="rgb(30,144,255)" visibility="visible" id="visText" style="text-anchor: start;" plotParam="VISIBILITY" fill="rgb(30,144,255)" baseline-shift="-0.4em" font-weight="bold" font-family="Courier" class="text" plotMode="VISIBLE" x="-3" y="-15" font-size="0.875em">0</text>

<!-- Ceiling From Surface -->
            <text stroke="rgb(255,255,0)" visibility="visible" id="ceilingText" style="text-anchor: start;" plotParam="CEIL_HFT" fill="rgb(255,255,0)" baseline-shift="-0.4em" font-weight="bold" font-family="Courier" class="text" plotMode="VISIBLE" x="10" y="0" font-size="0.8em">0</text>

<!-- Present WEATHER -->
            <text stroke="rgb(200,59,200)" visibility="visible" id="presWeatherText" style="text-anchor: start;" transform="scale(1.2)" plotParam="PRES_WEATHER" fill="rgb(200,59,200)" baseline-shift="-0.4em" font-weight="bold" font-family="Courier" class="weather" plotMode="VISIBLE" x="-20" y="-4" font-size="0.8em">175</text>

<!-- WIND BARBS -->
            <g id="speedText" plotParam="WIND_SPEED,WIND_DIR" class="text" x="0" y="0" required="true" transform="rotate(0,0,0),scale(1.2)" fill="rgb(0,255,0)" stroke="rgb(0,255,0)">
                <text class="arrow" id="speedText" x="0" y="0" fill="none" font-size="1em"> </text>
                <text class="barb" id="windArrowText" x="0" y="0" fill="none" font-size="1em">0</text>
            </g>

<!-- WIND GUST -->
            <text stroke="rgb(255,0,0)" visibility="visible" id="gustText" style="text-anchor: start;" plotParam="WIND_GUST" fill="rgb(255,0,0)" baseline-shift="-0.4em" font-weight="bold" font-family="Courier" class="text" plotMode="VISIBLE" x="0" y="15" font-size="0.8em">0</text>
        </symbol>

    </defs>

    <use height="150" id="wind" visibility="visible" width="150" x="75" y="75" xlink:href="#plotData"/>
</svg>