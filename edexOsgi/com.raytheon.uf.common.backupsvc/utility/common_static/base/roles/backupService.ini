 # -----------------------------------------------------------------------------
# Defined permissions
# Permissions must be listed in the permissions section to be available
# in the user admin GUI.
#
# permissionString = Description
# NOTE: permission names must use . instead of : due to INI parser limitation
# -----------------------------------------------------------------------------
[permissions]
backupService.dialog = Allows access to Backup Service Dialog

# Define the description for each role
# roleName = description
# -----------------------------------------------------------------------------
[roleDescriptions]
backupServiceAdmin = Allows access to Backup Service Dialog and creating Backup Services Configuration overrides.

# -----------------------------------------------------------------------------
# Define the permissions assigned to each role
# roleName = perm1, perm2, ..., permN
# -----------------------------------------------------------------------------
[roles]
backupServiceAdmin = backupService.dialog, \
                                        localization:*:common_static:site:*:backupsvc:*, \
                                        localization:*:common_static:site:*:localizationcategory:*